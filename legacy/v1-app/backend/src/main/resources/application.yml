spring:
  application:
    name: capvault
  datasource:
    url: jdbc:postgresql://localhost:5432/capvault
    username: capvault
    password: capvault
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
server:
  port: 8080

capvault:
  institutional-domain: cit.edu
  seed:
    enabled: true
  sheet:
    default-source-url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS01I-ERT-9M0I5O0TDyFKFrhARge3kyRcjqKpB4xkUZczo-JS3PaeXTcT78JpW0uLlafzljGIBDJxX/pubhtml?gid=1971664293&single=true"
  storage:
    provider: local
    local-root: storage/archive
    r2:
      endpoint: ${R2_ENDPOINT:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:}
      region: ${R2_REGION:auto}

logging:
  level:
    edu.cit.capvault: INFO
