spring:
  datasource:
    url: jdbc:h2:mem:capvault-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
